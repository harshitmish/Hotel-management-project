{% extends 'booking/base.html' %}
{% load static %}

{% block content %}

<div class="booking-details-page">

<div class="container booking-details-container">

    <!-- 🔥 TITLE -->
    <h2 class="title-main text-center mb-4">
        📝 Complete Your Booking
    </h2>

    <!-- 🔥 MESSAGES -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info text-center">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- 🔥 GLASS CARD -->
    <div class="booking-details-card">

        <h5 class="text-center mb-3 text-white">{{ room.name }}</h5>

        <form method="POST">
            {% csrf_token %}

            <!-- NAME -->
            <div class="mb-3">
                <label class="form-label text-white">Name</label>
                <input type="text" name="name" class="form-control input-premium"
                       value="{{ user.username }}" required>
            </div>

            <!-- PHONE -->
            <div class="mb-3">
                <label class="form-label text-white">Phone</label>

                <div class="d-flex gap-2">
                    <select name="country_code" class="form-control input-premium" style="max-width:120px;" required>
                        <option value="+91">🇮🇳 +91</option>
                        <option value="+1">🇺🇸 +1</option>
                        <option value="+44">🇬🇧 +44</option>
                    </select>

                    <input type="tel" name="phone" class="form-control input-premium"
                           placeholder="Enter phone number"
                           pattern="[0-9]{10}" maxlength="10" required>
                </div>
            </div>

            <!-- PEOPLE -->
            <div class="mb-3">
                <label class="form-label text-white">Total People</label>
                <select name="people" class="form-control input-premium" required>
                    <option value="">Select People</option>

                    {% for i in people_range %}
                        <option value="{{ i }}">
                            {{ i }} Person{% if i > 1 %}s{% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- AADHAR -->
            <input 
    type="text" 
    name="id_proof" 
    class="form-control input-premium"
    placeholder="Enter 12 digit Aadhar number"

    inputmode="numeric"
    pattern="[0-9]{12}"
    maxlength="12"

    oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,12)"

    required>
    <!-- 🔥 EXTRA SERVICES -->
<div class="mb-3">
    <label class="form-label text-white">Additional Services (Optional)</label>

    <div class="services-box">

        <label class="service-item">
            <input type="checkbox" name="services" value="scooty">
            Want scooty for tour
        </label>

        <label class="service-item">
            <input type="checkbox" name="services" value="cab">
            Want cab service
        </label>

        <label class="service-item">
            <input type="checkbox" name="services" value="laundry">
            Want laundry access
        </label>

        <label class="service-item">
            <input type="checkbox" name="services" value="gym">
            Want gym access
        </label>

        <label class="service-item">
            <input type="checkbox" name="services" value="guide">
            Want tourist guide
        </label>

    </div>
</div>

            <button class="btn btn-book w-100 mt-3">
                Confirm Booking
            </button>

        </form>

    </div>

</div>
</div>

<!-- 🔥 STYLE -->
<style>

/* 🔥 PAGE BG */
.booking-details-page {
    padding-top: 100px;
    min-height: 100vh;

    background: url("{% static 'images/hotel-bg.webp' %}") no-repeat center center/cover;
    position: relative;
}

/* 🔥 DARK OVERLAY */
.booking-details-page::before {
    content: "";
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background: rgba(0,0,0,0.6);
    z-index: 1;
}

/* 🔥 CENTER */
.booking-details-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    position: relative;
    z-index: 2;
}

/* 🔥 TITLE */
.title-main {
    color: white;
    font-weight: 600;
}

/* 🔥 CARD */
.booking-details-card {
    width: 100%;
    max-width: 500px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);

    color: white;
}

/* 🔥 INPUT */
.input-premium {
    border-radius: 10px;
    padding: 10px;
    border: none;
    background: rgba(255,255,255,0.9);
}

.input-premium:focus {
    outline: none;
    border: 2px solid #e6955c;
}

/* 🔥 BUTTON */
.btn-book {
    background: #7a1c00;
    color: white;
    padding: 12px;
    border-radius: 25px;
    font-weight: 600;
    border: none;
}

.btn-book:hover {
    background: #a52a00;
}

/* 🔥 MOBILE */
@media (max-width: 768px) {
    .booking-details-card {
        margin: 10px;
        padding: 20px;
    }
}




/* 🔥 SERVICES BOX */
.services-box {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* 🔥 EACH ITEM */
.service-item {
    display: flex;
    align-items: center;
    gap: 10px;

    background: rgba(255,255,255,0.1);
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.service-item:hover {
    background: rgba(255,255,255,0.2);
}

/* 🔥 CHECKBOX STYLE */
.service-item input {
    accent-color: #e6955c;
    cursor: pointer;
}
</style>

{% endblock %}

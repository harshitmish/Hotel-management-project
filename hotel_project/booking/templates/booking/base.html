<!DOCTYPE html>
<html>
<head>
    <title>Hotel Management</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="/">My Hotel</a>

    <div>
        <a class="nav-link d-inline text-white" href="/">Home</a>
        <a class="nav-link d-inline text-white" href="/rooms/">Rooms</a>
        <a class="nav-link d-inline text-white" href="/book/">Book</a>

        {% if user.is_authenticated %}
            <a class="nav-link d-inline text-white" href="/my-bookings/">My Bookings</a>
            <span class="text-white">Welcome, {{ user.username }}</span>
            <a class="nav-link d-inline text-white" href="/logout/">Logout</a>
        {% else %}
            <a class="nav-link d-inline text-white" href="/login/">Login</a>
            <a class="nav-link d-inline text-white" href="/signup/">Signup</a>
        {% endif %}
    </div>

  </div>
</nav>

<!-- Page Content -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>

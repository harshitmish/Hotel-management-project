{% extends 'booking/base.html' %}

{% block content %}

<style>
.input-group {
    position: relative;
}
.toggle-password {
    position: absolute;
    right: 10px;
    top: 10px;
    cursor: pointer;
    font-size: 14px;
}
</style>

<div class="container d-flex justify-content-center align-items-center" style="height:90vh;">

    <div class="card shadow p-4" style="width:380px; border-radius:15px;">

        <h3 class="text-center mb-4">🚀 Create Account</h3>

        <form method="POST" onsubmit="return validateForm()">
        {% csrf_token %}

            <!-- Email -->
            <div class="mb-3">
                <input name="email" type="email" class="form-control" placeholder="Enter Email" required>
            </div>

            <!-- Password -->
            <div class="mb-3 input-group">
                <input id="password" name="password" type="password" class="form-control" placeholder="Enter Password" required>
                <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3 input-group">
                <input id="confirmPassword" name="confirm_password" type="password" class="form-control" placeholder="Confirm Password" required>
                <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
            </div>

            <!-- JS Error -->
            <p id="error" style="color:red; font-size:14px;"></p>

            <button type="submit" class="btn btn-success w-100">Signup</button>

        </form>

        <!-- Django Error -->
        {% if error %}
        <div class="alert alert-danger text-center mt-2">
            {{ error }}
        </div>
        {% endif %}

    </div>

</div>

<script>
function togglePassword(id) {
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

function validateForm() {
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirmPassword").value;
    let error = document.getElementById("error");

    if (pass !== confirm) {
        error.innerText = "Passwords do not match ❌";
        return false;
    }

    if (pass.length < 6) {
        error.innerText = "Password must be at least 6 characters 🔐";
        return false;
    }

    error.innerText = "";
    return true;
}
</script>

{% endblock %}

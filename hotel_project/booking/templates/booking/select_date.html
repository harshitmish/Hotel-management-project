{% extends 'booking/base.html' %}

{% block content %}

<div class="container mt-5">
    <h3>Select Dates for {{ room.name }}</h3>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger text-center">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="date" name="check_in" class="form-control mb-3" required>
        <input type="date" name="check_out" class="form-control mb-3" required>

        <button class="btn btn-danger w-100">Confirm Dates</button>
    </form>

</div>

{% endblock %}

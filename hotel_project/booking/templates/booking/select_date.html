{% extends 'booking/base.html' %}
{% load static %}
{% block content %}

<div class="booking-page">

<div class="container booking-container">

    <!-- 🔥 CARD -->
    <div class="booking-card">

        <!-- TITLE -->
        <h3 class="text-center mb-3">
             Book Your Stay
        </h3>

        <p class="text-center text-muted mb-4">
            {{ room.name }} • {{ room.room_type }}
        </p>

        <!-- 🔥 ALERT -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- 🔥 FORM -->
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Check-in</label>
                <input type="date" name="check_in" class="form-control input-premium" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Check-out</label>
                <input type="date" name="check_out" class="form-control input-premium" required>
            </div>

            <button class="btn btn-book w-100 mt-2">
                Confirm Booking
            </button>

        </form>

    </div>

</div>
</div>

<!-- 🔥 STYLE -->
<style>
.booking-card h3,
.booking-card p {
    color: #fff !important;
}
.booking-page {
    padding-top: 100px;
    min-height: 100vh;

    background: url("{% static 'images/hotel-bg.webp' %}") no-repeat center center/cover;
    position: relative;
}

/* 🔥 DARK OVERLAY (FIXED) */
.booking-page::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.55); /* dark overlay */

    z-index: 1;
}

/* 🔥 CONTENT ABOVE OVERLAY */
.booking-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px);

    position: relative;
    z-index: 2; /* 🔥 IMPORTANT */
}

/* 🔥 GLASS CARD */
.booking-card {
    width: 100%;
    max-width: 420px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);

    color: white;

    position: relative;
    z-index: 3; /* 🔥 CLICK FIX */
}

/* 🔥 INPUT */
.input-premium {
    border-radius: 10px;
    padding: 12px;
    border: none;
    background: rgba(255,255,255,0.9);
    transition: 0.3s;
}

.input-premium:focus {
    outline: none;
    border: 2px solid #e6955c;
    box-shadow: 0 0 10px rgba(230,149,92,0.3);
}

/* 🔥 BUTTON */
.btn-book {
    background: #7a1c00;
    color: white;
    padding: 12px;
    border-radius: 25px;
    font-weight: 600;
    border: none;
    transition: 0.3s;
}

.btn-book:hover {
    background: #a52a00;
}

/* 🔥 MOBILE */
@media (max-width: 768px) {
    .booking-card {
        padding: 20px;
        margin: 10px;
    }
}
</style>
{% endblock %}

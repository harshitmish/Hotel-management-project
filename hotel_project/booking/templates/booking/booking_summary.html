{% extends 'booking/base.html' %}

{% block content %}

<style>
.summary-card {
    max-width: 550px;
    margin: auto;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    overflow: hidden;
}

.summary-header {
    background: linear-gradient(45deg, #ff4d4d, #ff6b6b);
    color: white;
    padding: 20px;
    text-align: center;
}

.summary-body {
    padding: 20px;
}

.summary-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    font-size: 15px;
}

.summary-item span {
    color: gray;
}

.confirm-btn {
    border-radius: 25px;
    padding: 10px;
    font-weight: bold;
    background: linear-gradient(45deg, #28a745, #5cd65c);
    border: none;
}

.confirm-btn:hover {
    transform: scale(1.05);
}
</style>

<div class="container mt-5">

    <div class="summary-card">

        <!-- 🔥 HEADER -->
        <div class="summary-header">
            <h3>📋 Booking Summary</h3>
            <p class="mb-0">{{ room.name }}</p>
        </div>

        <!-- 🔥 BODY -->
        <div class="summary-body">

            <div class="summary-item">
                <span>📅 Check-in</span>
                <b>{{ data.check_in }}</b>
            </div>

            <div class="summary-item">
                <span>📅 Check-out</span>
                <b>{{ data.check_out }}</b>
            </div>

            <div class="summary-item">
                <span>👤 Name</span>
                <b>{{ data.name }}</b>
            </div>

            <div class="summary-item">
                <span>📞 Phone</span>
                <b>{{ data.phone }}</b>
            </div>

            <div class="summary-item">
                <span>👥 People</span>
                <b>{{ data.people }}</b>
            </div>

            <div class="summary-item">
                <span>🪪 ID Proof</span>
                <b>{{ data.id_proof }}</b>
            </div>

            <hr>

            <!-- 🔥 BUTTON -->
            <form method="POST" onsubmit="disableBtn()" class="text-center">
                {% csrf_token %}

                <button id="pay-btn" type="button" class="confirm-btn w-100">
                    Pay Now 💳
                </button>
            </form>

        </div>

    </div>

</div>

<!-- 🔥 RAZORPAY SCRIPT -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
document.getElementById("pay-btn").onclick = function (e) {

    e.preventDefault();

    fetch("/create-payment/")
    .then(response => response.json())
    .then(data => {

        var options = {
            "key": data.key,
            "amount": data.amount,
            "currency": "INR",
            "order_id": data.order_id,

            "handler": function (response){

                console.log("Payment success:", response);

                // ✅ NO FETCH → DIRECT REDIRECT (FIX)
                alert("Payment Successful 🎉");
                window.location.href = "/my-bookings/";

            },

            "modal": {
                "ondismiss": function(){
                    console.log("Payment popup closed");
                }
            },

            "theme": {
                "color": "#ff4d4d"
            }
        };

        var rzp = new Razorpay(options);
        rzp.open();
    })
    .catch(error => {
        console.error("Payment error:", error);
        alert("Payment failed ❌");
    });
};
</script>

<!-- 🔥 OLD FUNCTION (unchanged) -->
<script>
function disableBtn() {
    document.getElementById("bookBtn").disabled = true;
    document.getElementById("bookBtn").innerText = "Processing...";
}
</script>

{% endblock %}

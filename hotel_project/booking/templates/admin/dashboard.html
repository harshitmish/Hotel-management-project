{% extends "admin/base_site.html" %}

{% block content %}

<div style="padding:20px;">

    <h1 style="text-align:center;">📊 Hotel Analytics Dashboard</h1>

    <!-- Stats Cards -->
    <div style="
        display:flex; 
        gap:20px; 
        margin-top:20px; 
        flex-wrap:wrap; 
        justify-content:center;
    ">

        <div style="
            padding:20px; 
            background:#28a745; 
            color:white; 
            border-radius:10px; 
            min-width:150px; 
            flex:1 1 200px;
            text-align:center;
        ">
            <h3>Rooms</h3>
            <p style="font-size:20px;">{{ total_rooms }}</p>
        </div>

        <div style="
            padding:20px; 
            background:#007bff; 
            color:white; 
            border-radius:10px; 
            min-width:150px; 
            flex:1 1 200px;
            text-align:center;
        ">
            <h3>Bookings</h3>
            <p style="font-size:20px;">{{ total_bookings }}</p>
        </div>

        <div style="
            padding:20px; 
            background:#dc3545; 
            color:white; 
            border-radius:10px; 
            min-width:150px; 
            flex:1 1 200px;
            text-align:center;
        ">
            <h3>Revenue</h3>
            <p style="font-size:20px;">₹{{ revenue }}</p>
        </div>

    </div>

    <!-- Chart -->
    <div style="margin-top:40px; width:100%; overflow-x:auto;">
        <canvas id="chart" style="width:100%; max-width:100%;"></canvas>
    </div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    let ctx = document.getElementById('chart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ dates|safe }},
            datasets: [{
                label: 'Bookings',
                data: {{ counts|safe }},
                borderColor: 'blue',
                backgroundColor: 'rgba(0,0,255,0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>

{% endblock %}

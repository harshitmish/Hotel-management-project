{% extends "admin/base_site.html" %}

{% block content %}

<div style="padding:20px;">

    <h1>📊 Hotel Analytics Dashboard</h1>

    <!-- Stats Cards -->
    <div style="display:flex; gap:20px; margin-top:20px; flex-wrap:wrap;">

        <div style="padding:20px; background:#28a745; color:white; border-radius:10px;">
            <h3>Rooms</h3>
            <p>{{ total_rooms }}</p>
        </div>

        <div style="padding:20px; background:#007bff; color:white; border-radius:10px;">
            <h3>Bookings</h3>
            <p>{{ total_bookings }}</p>
        </div>

        <div style="padding:20px; background:#dc3545; color:white; border-radius:10px;">
            <h3>Revenue</h3>
            <p>₹{{ revenue }}</p>
        </div>

    </div>

    <!-- Chart -->
    <div style="margin-top:40px;">
        <canvas id="chart" height="100"></canvas>
    </div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    let ctx = document.getElementById('chart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ dates|safe }},
            datasets: [{
                label: 'Bookings',
                data: {{ counts|safe }},
                borderColor: 'blue',
                backgroundColor: 'rgba(0,0,255,0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true
        }
    });
</script>

{% endblock %}
